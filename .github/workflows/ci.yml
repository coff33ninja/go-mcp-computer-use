name: CI

on:
  push:
    branches: [main, "v0.2.x"]
  pull_request:
    branches: [main, "v0.2.x"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Lint + Build
        shell: pwsh
        run: ./scripts/lint.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-windows-${{ github.sha }}
          path: mcp-server.exe
          compression-level: 0
          if-no-files-found: error
