name: CI

on:
  push:
    branches: ["v0.2.x"]
  pull_request:
    branches: ["v0.2.x"]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Lint
        shell: pwsh
        run: ./scripts/lint.ps1

      - name: Check tool docs are up to date
        shell: pwsh
        run: |
          go run ./scripts/gen-tools-doc.go
          $diff = git diff --name-only docs/reference/tools.md
          if ($diff) {
            Write-Host "ERROR: docs/reference/tools.md is stale. Run 'go run ./scripts/gen-tools-doc.go' and commit."
            git diff docs/reference/tools.md
            exit 1
          } else {
            Write-Host "docs/reference/tools.md is up to date"
          }

      - name: Check go.mod is tidy
        shell: pwsh
        run: |
          go mod tidy
          $diff = git diff --name-only go.mod go.sum
          if ($diff) {
            Write-Host "ERROR: go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            git diff go.mod go.sum
            exit 1
          } else {
            Write-Host "go.mod is tidy"
          }

  build:
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install Zig
        shell: pwsh
        run: |
          $url = "https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip"
          $zip = "$env:TEMP\zig.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:ProgramFiles" -Force
          echo "$env:ProgramFiles\zig-x86_64-windows-0.16.0" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build with Zig cc + CGO
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-windows-${{ github.sha }}
          path: mcp-server.exe
          compression-level: 0
          if-no-files-found: error

  vtable-check:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: COM vtable verification
        shell: pwsh
        run: go test -v -tags=vtable ./internal/actions/ -run 'TestVtable'

      - name: Verify vtable docs are in sync with source
        shell: pwsh
        run: go run ./scripts/verify-vtable-docs.go

      - name: Verify WinRT IID docs are in sync with source
        shell: pwsh
        run: |
          powershell -File scripts\discover-winrt-iids.ps1 -UpdateDocs
          go run ./scripts/verify-iid-usage.go
          $diff = git diff --name-only docs/reference/com-patterns.md
          if ($diff) {
            Write-Host "ERROR: docs/reference/com-patterns.md has drift. Run 'powershell -File scripts\discover-winrt-iids.ps1 -UpdateDocs' and commit."
            git diff docs/reference/com-patterns.md
            exit 1
          } else {
            Write-Host "WinRT IID docs are up to date"
          }
